# Currently, only the `marketing` app has a Dockerfile. This workflow is intended to be expanded upon in the future to include other apps that have Dockerfiles.
# Future iterations of this workflow will include a matrix strategy to build and publish Docker images for all apps that have Dockerfiles.

# The name does not use spaces due to https://github.com/integrations/slack/issues/1790
name: Marketing-App-Deploy

# Configures this workflow to run every time a change is pushed to `frontend`
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**'

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: code-dot-org/marketing

concurrency:
  # For pushes to main, requests are grouped into the "deploy-marketing" concurrency group to queue them up
  # For pull requests, there are no limits to concurrency
  group: ${{ github.run_id }}
  # For pushes to main, multiple pushes are queued
  # For pull requests, multiple pushes to the same PR cancels previous executions
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  ci:
    uses: ./.github/workflows/marketing-app-ci.yml
    secrets: inherit

  # Job: build-and-push-image
  # This job builds a docker image for the frontend repository and pushes the docker image to Github Packages.
  # More information: https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-docker-images
  build-and-push-image:
    runs-on: ubuntu-24.04

    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    # Expose the docker image and tag that this job produces
    outputs:
      fullImageUri: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}@${{ steps.push.outputs.digest }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Frontend
        uses: ./.github/actions/frontend/setup

      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see "[Usage](https://github.com/docker/build-push-action#usage)" in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: apps/marketing/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          network:
            host # This is required for the `turbo` command to work properly in the Dockerfile.
            # Note TURBO_TOKEN is not a secret because we use a local turbo instance, it is stubbed out for future use only.
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_REPO_TEAM }}
            TURBO_TOKEN=${{ secrets.TURBO_REPO_TOKEN }}
            TURBO_API=${{ vars.TURBO_REPO_API }}
            GIT_SHA=${{ github.sha }}

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see "[AUTOTITLE](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds)."
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # Extracts the client static assets from the pushed image, injects Sentry debug IDs, uploads the source maps
  # to Sentry ONCE, and publishes the injected static/ tree as a workflow artifact for the per-env deploy jobs
  # to consume. Runs once per deploy regardless of site_type matrix, so the Sentry upload isn't duplicated.
  prepare-static-assets:
    needs: build-and-push-image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Frontend
        uses: ./.github/actions/frontend/setup

      - name: Log in to the Container registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract static/ from pushed image
        run: |
          IMAGE="${{ needs.build-and-push-image.outputs.fullImageUri }}"
          NAME="extract-${{ github.run_id }}-${{ github.run_attempt }}"
          # Always clean up, even if docker cp fails — avoids name-collision on workflow retries.
          trap 'docker rm -f "$NAME" >/dev/null 2>&1 || true' EXIT
          docker pull "$IMAGE"
          docker create --name "$NAME" "$IMAGE"
          docker cp "$NAME":/app/apps/marketing/.next/static/ ./static

      # Writes deterministic debug IDs into each client chunk and its .map. Skipped cleanly when Sentry isn't
      # configured — the artifact will still be published; deploys will S3-sync pristine files.
      - name: Inject Sentry debug IDs
        if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != '' }}
        run: yarn workspace @code-dot-org/marketing exec sentry-cli sourcemaps inject ../../static

      # Publish the (injected) static/ as an artifact that per-env deploy jobs pull down and sync to their S3
      # bucket — guarantees the bytes on every environment's S3 match the bytes whose maps we upload to Sentry.
      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          # Include run_attempt so workflow re-runs don't collide on the artifact name.
          name: marketing-static-${{ github.run_id }}-${{ github.run_attempt }}
          path: ./static
          retention-days: 1
          if-no-files-found: error

      # Single Sentry upload per deploy — matrix envs do not repeat this work.
      - name: Upload source maps to Sentry
        if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != '' }}
        env:
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          yarn workspace @code-dot-org/marketing exec sentry-cli sourcemaps upload \
            --release="${GITHUB_SHA}" \
            ../../static

  # Deploy test environments in parallel
  deploy-test:
    needs:
      - ci
      - build-and-push-image
      - prepare-static-assets
    uses: ./.github/workflows/marketing-app-deploy-to-environment.yml
    secrets: inherit
    # Do not allow other deployments to deploy while this deployment is in progress.
    concurrency:
      group: deploy-marketing-sites-test-${{ github.ref_name }}-${{ matrix.SITE_TYPE }}
      cancel-in-progress: false
    with:
      CONTAINER_IMAGE_DIGEST: ${{ needs.build-and-push-image.outputs.digest }}
      ENVIRONMENT_TYPE: test
      SITE_TYPE: ${{ matrix.SITE_TYPE }}
    strategy:
      fail-fast: true
      matrix:
        SITE_TYPE: [corporate, csforall]

  # Deploy production environments in parallel, after test environments completes successfully
  deploy-production:
    needs:
      - ci
      - build-and-push-image
      - prepare-static-assets
      - deploy-test
    uses: ./.github/workflows/marketing-app-deploy-to-environment.yml
    secrets: inherit
    # Do not allow other deployments to deploy while this deployment is in progress.
    concurrency:
      group: deploy-marketing-sites-production-${{ github.ref_name }}-${{ matrix.SITE_TYPE }}
      cancel-in-progress: false
    with:
      CONTAINER_IMAGE_DIGEST: ${{ needs.build-and-push-image.outputs.digest }}
      ENVIRONMENT_TYPE: production
      SITE_TYPE: ${{ matrix.SITE_TYPE }}
    strategy:
      fail-fast: true
      matrix:
        SITE_TYPE: [corporate, csforall]
