# EXPERIMENT: Test coordinator pattern — teardown waits for both eyes jobs AND
# a simulated "Drone" before calling /complete. Proves a single /complete after
# all CI systems finish captures the full test count.
name: Frontend-CI

on:
  pull_request:
    branches:
      - main

env:
  APPLITOOLS_BATCH_ID: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      component-library-changed: ${{ steps.changes.outputs.component-library }}
    steps:
      - name: Get Change Sets
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            component-library:
              - 'apps/design-system-storybook/**'
              - 'packages/component-library/**'
              - 'packages/component-library-styles/**'
              - 'packages/fonts/**'
              - '*'

  marketing:
    needs: setup
    uses: ./.github/workflows/marketing-app-ci.yml
    with:
      BRANCHED_TESTING_ENABLED: ${{ contains( github.event.pull_request.labels.*.name, 'All The Things') }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
    secrets: inherit

  component-library:
    if: ${{ needs.setup.outputs.component-library-changed == 'true' }}
    needs: setup
    uses: ./.github/workflows/component-library-ci.yml
    secrets: inherit

  # Simulates Drone finishing after a delay. In production, the coordinator
  # would watch for Drone's commit status instead of running a timer.
  drone-simulator:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - name: Simulate Drone delay (5 min)
        run: sleep 300
      - name: Post fake Drone status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ env.APPLITOOLS_BATCH_ID }} \
            -f state=success \
            -f context="continuous-integration/drone/pr" \
            -f description="Simulated Drone CI passed"

  # Waits for ALL systems (eyes + "Drone") before calling /complete once.
  teardown:
    needs: [setup, marketing, component-library, drone-simulator]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check all systems
        run: |
          echo "marketing: ${{ needs.marketing.result }}"
          echo "component-library: ${{ needs.component-library.result }}"
          echo "drone-simulator: ${{ needs.drone-simulator.result }}"

      - name: Call /complete (all systems done)
        shell: bash
        run: |
          echo "All systems complete — calling /complete"
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "https://eyesapi.applitools.com/api/externals/github/servers/github.com/commit/${{ env.APPLITOOLS_BATCH_ID }}/${{ github.run_id }}/complete?apiKey=${{ secrets.APPLITOOLS_API_KEY }}")
          echo "$RESP"

      - name: Verify statuses
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 10
          echo "=== Applitools statuses ==="
          gh api repos/${{ github.repository }}/commits/${{ env.APPLITOOLS_BATCH_ID }}/statuses \
            --jq '.[] | select(.context | test("applitools|drone")) | {context, description, state, created_at}'
