# Common workflow for execution of continuous integration for the `frontend` code base.
# This workflow handles setup and teardown for parallel workflow execution for the various apps and packages in `frontend`.
name: Frontend-CI

on:
  pull_request:
    branches:
      - main

env:
  APPLITOOLS_BATCH_ID: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  # Initializes common variables and environment prior to executing other jobs
  setup:
    runs-on: ubuntu-24.04
    outputs:
      component-library-changed: ${{ steps.changes.outputs.component-library }}
    steps:
      # Determine what changed to later skip workflows
      # Github Actions does not offer conditional runtime path filtering, thus use this action to calculate the
      # changes. Root level applications (such as marketing) are not skipped as its dependency tree always changes
      - name: Get Change Sets
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            component-library:
              - 'apps/design-system-storybook/**'
              - 'packages/component-library/**'
              - 'packages/component-library-styles/**'
              - 'packages/fonts/**'
              - '*'

  # Start the component library CI workflow
  component-library:
    if: ${{ needs.setup.outputs.component-library-changed == 'true' }}
    needs: setup
    uses: ./.github/workflows/component-library-ci.yml
    secrets: inherit

  # EXPERIMENT: Call /complete after component-library finishes but BEFORE
  # marketing storybook Eyes finish. This simulates "GHA finishes first."
  teardown-early:
    needs: [setup, component-library]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Early /complete (component-library results only)
        shell: bash
        run: |
          echo "=== Early /complete — only component-library Eyes results should be in the batch ==="
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://eyesapi.applitools.com/api/externals/github/servers/github.com/commit/${{ env.APPLITOOLS_BATCH_ID }}/${{ github.run_id }}-early/complete?apiKey=${{secrets.APPLITOOLS_API_KEY}}")
          echo "$RESP"

  # Start the marketing app CI workflow — delayed by 3 minutes to ensure
  # teardown-early fires before marketing Eyes finish.
  marketing:
    needs: [setup, teardown-early]
    uses: ./.github/workflows/marketing-app-ci.yml
    with:
      BRANCHED_TESTING_ENABLED: ${{ contains( github.event.pull_request.labels.*.name, 'All The Things') }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
    secrets: inherit

  # EXPERIMENT: Call /complete AFTER marketing finishes too.
  # If re-evaluation works, the status should now reflect MORE tests.
  teardown-final:
    needs: [setup, marketing, component-library]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Final /complete (all Eyes results should be in the batch)
        shell: bash
        run: |
          echo "=== Final /complete — both component-library AND marketing Eyes results should be in the batch ==="
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://eyesapi.applitools.com/api/externals/github/servers/github.com/commit/${{ env.APPLITOOLS_BATCH_ID }}/${{ github.run_id }}-final/complete?apiKey=${{secrets.APPLITOOLS_API_KEY}}")
          echo "$RESP"
